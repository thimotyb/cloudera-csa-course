services:
  sql-client:
    build: ./sql-client
    image: local/flink-sql-demo-sql-client:v1.11-en
    depends_on:
      - kafka
      - jobmanager
      - elasticsearch
    environment:
      FLINK_JOBMANAGER_HOST: jobmanager
      KAFKA_BOOTSTRAP: kafka
      MYSQL_HOST: mysql
      ES_HOST: elasticsearch

  jobmanager:
    image: flink:1.11.0-scala_2.11
    command: jobmanager
    ports:
      - "${FLINK_SQL_REST_PORT:-18082}:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager

  taskmanager:
    image: flink:1.11.0-scala_2.11
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 10

  datagen:
    build:
      context: .
      dockerfile: datagen/Dockerfile
    image: local/flink-sql-demo-datagen:v1.11-en
    command: "java -classpath /opt/datagen/flink-sql-demo.jar myflink.SourceGenerator --input /opt/datagen/user_behavior.log --output kafka kafka:9094 --speedup 2000"
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP: kafka

  mysql:
    build: ./mysql
    image: local/flink-sql-demo-mysql:v1.11-en
    ports:
      - "${FLINK_SQL_MYSQL_PORT:-13306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "${FLINK_SQL_KAFKA_OUTSIDE_PORT:-19092}:9092"
      - "${FLINK_SQL_KAFKA_INSIDE_PORT:-19094}:9094"
    environment:
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=INSIDE://0.0.0.0:9094,OUTSIDE://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INSIDE://kafka:9094,OUTSIDE://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INSIDE
      - KAFKA_NUM_PARTITIONS=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.6.0
    environment:
      - cluster.name=docker-cluster
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
    ports:
      - "${FLINK_SQL_ES_HTTP_PORT:-19200}:9200"
      - "${FLINK_SQL_ES_TRANSPORT_PORT:-19300}:9300"

  kibana:
    image: docker.elastic.co/kibana/kibana:7.6.0
    ports:
      - "${FLINK_SQL_KIBANA_PORT:-15601}:5601"
